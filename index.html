<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#121214">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PREMIERE">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<title>PREMIERE</title>
<style>
  :root {
    --bg: #121214;
    --surface: #1c1c1f;
    --surface-2: #232327;
    --text: #f2f0ec;
    --text-dim: #9b9a96;
    --border: #2e2e32;
    --premiere: #c9a227;
    --kooltura: #e8543c;
    --tenshi: #e6a4c4;
    --glintgrillz: #2ba84a;
    --accent: var(--premiere);
    --radius: 14px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    overscroll-behavior-y: none;
    min-height: 100vh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  .display {
    font-family: "Georgia", "Times New Roman", serif;
    font-weight: 700;
    letter-spacing: -0.02em;
  }

  #app { max-width: 560px; margin: 0 auto; min-height: 100vh; position: relative; }

  /* ---------- HOME: selezione brand ---------- */
  .home-header {
    padding: calc(env(safe-area-inset-top) + 32px) 24px 16px;
    text-align: center;
  }
  .home-header .eyebrow {
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
  .home-header h1 {
    font-size: 38px;
    margin: 6px 0 0;
  }

  .brand-list {
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding: 20px;
  }

  .brand-card {
    position: relative;
    border-radius: var(--radius);
    padding: 28px 22px;
    background: var(--surface);
    border: 1px solid var(--border);
    overflow: hidden;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.15s ease;
  }
  .brand-card:active { transform: scale(0.98); }

  .brand-card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 5px;
    background: var(--card-accent);
  }

  .brand-card .brand-name {
    font-size: 26px;
    margin: 0 0 4px;
  }
  .brand-card .brand-tags {
    font-size: 13px;
    color: var(--text-dim);
    letter-spacing: 0.02em;
  }

  /* ---------- SCHERMATA NEGOZIO ---------- */
  .negozio-screen { display: none; min-height: 100vh; flex-direction: column; }
  .negozio-screen.active { display: flex; }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: calc(env(safe-area-inset-top) + 16px) 16px 14px;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
    background: var(--bg);
    z-index: 10;
  }
  .back-btn {
    background: none;
    border: none;
    color: var(--text);
    font-size: 22px;
    padding: 4px 8px 4px 0;
    cursor: pointer;
  }
  .top-bar .brand-name { font-size: 20px; margin: 0; flex: 1; }
  .top-bar .accent-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--accent);
  }

  .content { flex: 1; padding: 16px; padding-bottom: 100px; }

  .tab-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    max-width: 560px;
    margin: 0 auto;
    display: flex;
    background: var(--surface);
    border-top: 1px solid var(--border);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    color: var(--text-dim);
    font-size: 12px;
    padding: 12px 4px 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .tab-btn.active { color: var(--accent); font-weight: 600; }
  .tab-btn .tab-icon { display: block; font-size: 20px; margin-bottom: 2px; }

  .section-view { display: none; }
  .section-view.active { display: block; }

  /* ---------- COMPONENTI ---------- */
  .product-card, .slot-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .product-card .name, .slot-card .name { font-size: 17px; font-weight: 600; margin: 0 0 4px; }
  .product-card .meta, .slot-card .meta { color: var(--text-dim); font-size: 14px; margin: 0 0 12px; }

  .qty-row { display: flex; align-items: center; gap: 12px; }
  .qty-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-size: 18px;
    cursor: pointer;
  }
  .qty-value { min-width: 24px; text-align: center; font-weight: 600; }

  .btn-primary {
    background: var(--accent);
    color: #15130a;
    border: none;
    border-radius: 10px;
    padding: 13px 18px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }
  .btn-primary:disabled { opacity: 0.4; }

  .cart-bar {
    position: fixed;
    bottom: 64px;
    left: 16px; right: 16px;
    max-width: 528px;
    margin: 0 auto;
    background: var(--accent);
    color: #15130a;
    border-radius: 12px;
    padding: 14px 18px;
    display: none;
    align-items: center;
    justify-content: space-between;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.4);
  }
  .cart-bar.visible { display: flex; }

  input[type=text], input[type=number] {
    width: 100%;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 11px 12px;
    font-size: 15px;
    margin-bottom: 10px;
  }

  .empty-state {
    text-align: center;
    color: var(--text-dim);
    padding: 60px 20px;
    font-size: 15px;
  }

  .toast {
    position: fixed;
    bottom: 140px;
    left: 20px; right: 20px;
    max-width: 520px;
    margin: 0 auto;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    font-size: 14px;
    text-align: center;
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s ease;
    pointer-events: none;
    z-index: 100;
  }
  .toast.visible { opacity: 1; transform: translateY(0); }
  .toast .code { font-size: 22px; font-weight: 700; color: var(--accent); margin-top: 4px; }
</style>
</head>
<body>

<div id="app">

  <!-- HOME: selezione brand -->
  <div id="home-screen">
    <div class="home-header">
      <div class="eyebrow">Benvenuto</div>
      <h1 class="display">PREMIERE</h1>
    </div>
    <div class="brand-list" id="brand-list"></div>
  </div>

  <!-- Le schermate negozio vengono generate dinamicamente in JS -->
  <div id="negozi-container"></div>

</div>

<div class="toast" id="toast"></div>

<script>
const API_BASE = "https://premierapp.onrender.com";

const ACCENTI = {
  premiere: "var(--premiere)",
  kooltura: "var(--kooltura)",
  tenshi: "var(--tenshi)",
  glintgrillz: "var(--glintgrillz)"
};

const ICONE_TAB = { store: "🛍️", eventi: "🎟️", laboratorio: "🛠️" };
const ETICHETTE_TAB = { store: "Store", eventi: "Eventi", laboratorio: "Laboratorio" };

let NEGOZI = {};
let carrelli = {}; // { negozio_id: { prodotto_id: quantita } }

async function apiGet(path) {
  const r = await fetch(API_BASE + path);
  if (!r.ok) throw await r.json().catch(() => ({errore: "Errore di rete"}));
  return r.json();
}
async function apiPost(path, body) {
  const r = await fetch(API_BASE + path, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });
  const dati = await r.json();
  if (!r.ok) throw dati;
  return dati;
}

function mostraToast(html, durata = 3500) {
  const toast = document.getElementById("toast");
  toast.innerHTML = html;
  toast.classList.add("visible");
  clearTimeout(toast._timer);
  toast._timer = setTimeout(() => toast.classList.remove("visible"), durata);
}

// ---------------------------------------------------------------
// AVVIO: carica l'elenco negozi e costruisce la Home
// ---------------------------------------------------------------
async function avvia() {
  try {
    NEGOZI = await apiGet("/negozi");
  } catch (e) {
    document.getElementById("brand-list").innerHTML =
      '<div class="empty-state">Impossibile contattare il server.<br>Controlla la connessione e riprova.</div>';
    return;
  }

  const lista = document.getElementById("brand-list");
  lista.innerHTML = "";
  for (const [id, info] of Object.entries(NEGOZI)) {
    const sezioni = Object.entries(info.sezioni)
      .filter(([k, v]) => v)
      .map(([k]) => ETICHETTE_TAB[k] || k)
      .join("  ·  ");

    const card = document.createElement("div");
    card.className = "brand-card";
    card.style.setProperty("--card-accent", ACCENTI[id] || "#888");
    card.innerHTML = `
      <div class="brand-name display">${info.nome_visualizzato}</div>
      <div class="brand-tags">${sezioni}</div>
    `;
    card.addEventListener("click", () => apriNegozio(id));
    lista.appendChild(card);

    creaSchermataNegozio(id, info);
  }
}

// ---------------------------------------------------------------
// Costruisce (una sola volta) la schermata di un negozio con le sue tab
// ---------------------------------------------------------------
function creaSchermataNegozio(negozioId, info) {
  const container = document.getElementById("negozi-container");
  const accent = ACCENTI[negozioId] || "#888";

  const sezioniAttive = Object.entries(info.sezioni).filter(([k, v]) => v).map(([k]) => k);

  const tabsHtml = sezioniAttive.map((sez, i) => `
    <button class="tab-btn ${i === 0 ? 'active' : ''}" data-negozio="${negozioId}" data-sezione="${sez}">
      <span class="tab-icon">${ICONE_TAB[sez]}</span>${ETICHETTE_TAB[sez]}
    </button>
  `).join("");

  const sectionsHtml = sezioniAttive.map((sez, i) => `
    <div class="section-view ${i === 0 ? 'active' : ''}" id="section-${negozioId}-${sez}"></div>
  `).join("");

  const screen = document.createElement("div");
  screen.className = "negozio-screen";
  screen.id = `screen-${negozioId}`;
  screen.style.setProperty("--accent", accent);
  screen.innerHTML = `
    <div class="top-bar">
      <button class="back-btn" data-action="torna-home">←</button>
      <div class="brand-name display">${info.nome_visualizzato}</div>
      <div class="accent-dot"></div>
    </div>
    <div class="content">${sectionsHtml}</div>
    <div class="cart-bar" id="cartbar-${negozioId}"></div>
    <div class="tab-bar">${tabsHtml}</div>
  `;
  container.appendChild(screen);

  screen.querySelector('[data-action="torna-home"]').addEventListener("click", tornaHome);
  screen.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => mostraSezione(negozioId, btn.dataset.sezione));
  });

  carrelli[negozioId] = {};

  if (sezioniAttive.length > 0) {
    caricaSezione(negozioId, sezioniAttive[0]);
  }
}

function apriNegozio(negozioId) {
  document.getElementById("home-screen").style.display = "none";
  document.getElementById(`screen-${negozioId}`).classList.add("active");
}

function tornaHome() {
  document.querySelectorAll(".negozio-screen").forEach(s => s.classList.remove("active"));
  document.getElementById("home-screen").style.display = "block";
}

function mostraSezione(negozioId, sezione) {
  const screen = document.getElementById(`screen-${negozioId}`);
  screen.querySelectorAll(".tab-btn").forEach(b => {
    b.classList.toggle("active", b.dataset.sezione === sezione);
  });
  screen.querySelectorAll(".section-view").forEach(v => {
    v.classList.toggle("active", v.id === `section-${negozioId}-${sezione}`);
  });
  caricaSezione(negozioId, sezione);
}

// ---------------------------------------------------------------
// Caricamento dati per sezione (store / eventi / laboratorio)
// ---------------------------------------------------------------
async function caricaSezione(negozioId, sezione) {
  if (sezione === "store") return caricaStore(negozioId);
  if (sezione === "eventi") return caricaSlot(negozioId, "eventi");
  if (sezione === "laboratorio") return caricaSlot(negozioId, "laboratorio");
}

// ---------- STORE ----------
async function caricaStore(negozioId) {
  const el = document.getElementById(`section-${negozioId}-store`);
  el.innerHTML = '<div class="empty-state">Caricamento prodotti…</div>';

  let prodotti;
  try {
    prodotti = await apiGet(`/${negozioId}/prodotti`);
  } catch (e) {
    el.innerHTML = '<div class="empty-state">Errore nel caricare i prodotti.</div>';
    return;
  }

  if (prodotti.length === 0) {
    el.innerHTML = '<div class="empty-state">Nessun prodotto disponibile al momento.</div>';
    aggiornaCartBar(negozioId);
    return;
  }

  el.innerHTML = "";
  prodotti.forEach(p => {
    const qty = carrelli[negozioId][p.id] || 0;
    const card = document.createElement("div");
    card.className = "product-card";
    card.innerHTML = `
      <div class="name">${p.nome}</div>
      <div class="meta">EUR ${p.prezzo.toFixed(2)} · ${p.quantita_disponibile} disponibili</div>
      <div class="qty-row">
        <button class="qty-btn" data-action="meno">−</button>
        <span class="qty-value">${qty}</span>
        <button class="qty-btn" data-action="piu">+</button>
      </div>
    `;
    card.querySelector('[data-action="meno"]').addEventListener("click", () => cambiaCarrello(negozioId, p.id, -1, p.quantita_disponibile, card));
    card.querySelector('[data-action="piu"]').addEventListener("click", () => cambiaCarrello(negozioId, p.id, 1, p.quantita_disponibile, card));
    el.appendChild(card);
  });

  aggiornaCartBar(negozioId);
}

function cambiaCarrello(negozioId, prodottoId, delta, maxDisponibile, cardEl) {
  const attuale = carrelli[negozioId][prodottoId] || 0;
  let nuovo = attuale + delta;
  if (nuovo < 0) nuovo = 0;
  if (nuovo > maxDisponibile) nuovo = maxDisponibile;
  carrelli[negozioId][prodottoId] = nuovo;
  cardEl.querySelector(".qty-value").textContent = nuovo;
  aggiornaCartBar(negozioId);
}

function aggiornaCartBar(negozioId) {
  const bar = document.getElementById(`cartbar-${negozioId}`);
  const carrello = carrelli[negozioId];
  const totaleArticoli = Object.values(carrello).reduce((a, b) => a + b, 0);

  if (totaleArticoli === 0) {
    bar.classList.remove("visible");
    return;
  }
  bar.classList.add("visible");
  bar.innerHTML = `<span>${totaleArticoli} articoli nel carrello</span><span>Conferma ordine →</span>`;
  bar.onclick = () => confermaOrdine(negozioId);
}

async function confermaOrdine(negozioId) {
  const carrello = carrelli[negozioId];
  const righe = Object.entries(carrello)
    .filter(([id, q]) => q > 0)
    .map(([id, q]) => ({ prodotto_id: parseInt(id), quantita: q }));

  if (righe.length === 0) return;

  try {
    const risultato = await apiPost(`/${negozioId}/ordini`, { cliente: "Cliente", righe });
    carrelli[negozioId] = {};
    mostraToast(`Ordine confermato<div class="code">#${risultato.ordine_id}</div>`);
    caricaStore(negozioId);
  } catch (e) {
    mostraToast(e.errore || "Errore durante l'ordine");
  }
}

// ---------- EVENTI / LABORATORIO (slot con prenotazione) ----------
async function caricaSlot(negozioId, tipo) {
  const el = document.getElementById(`section-${negozioId}-${tipo}`);
  el.innerHTML = '<div class="empty-state">Caricamento…</div>';

  let slots;
  try {
    slots = await apiGet(`/${negozioId}/${tipo}`);
  } catch (e) {
    el.innerHTML = '<div class="empty-state">Errore nel caricare la disponibilità.</div>';
    return;
  }

  if (slots.length === 0) {
    el.innerHTML = '<div class="empty-state">Nessuna disponibilità al momento.</div>';
    return;
  }

  el.innerHTML = "";
  slots.forEach(s => {
    const liberi = s.posti_max - s.posti_prenotati;
    const card = document.createElement("div");
    card.className = "slot-card";
    card.innerHTML = `
      <div class="name">${s.titolo}</div>
      <div class="meta">${s.data_ora} · ${liberi} posti liberi su ${s.posti_max}</div>
      <input type="text" placeholder="Il tuo nome" data-field="nome">
      <input type="number" placeholder="Numero posti" value="1" min="1" data-field="posti">
      <button class="btn-primary" data-action="prenota" ${liberi === 0 ? "disabled" : ""}>
        ${liberi === 0 ? "Posti esauriti" : "Prenota"}
      </button>
    `;
    card.querySelector('[data-action="prenota"]').addEventListener("click", () => {
      const nome = card.querySelector('[data-field="nome"]').value.trim();
      const posti = parseInt(card.querySelector('[data-field="posti"]').value) || 1;
      prenotaSlot(negozioId, tipo, s.id, nome, posti);
    });
    el.appendChild(card);
  });
}

async function prenotaSlot(negozioId, tipo, slotId, nome, numeroPosti) {
  if (!nome) {
    mostraToast("Inserisci il tuo nome per prenotare");
    return;
  }
  try {
    const risultato = await apiPost(`/${tipo}/${slotId}/prenota`, { nome_persona: nome, numero_posti: numeroPosti });
    mostraToast(`Prenotazione confermata<br>Conserva il tuo codice:<div class="code">#${risultato.prenotazione_id}</div>`, 5000);
    caricaSlot(negozioId, tipo);
  } catch (e) {
    mostraToast(e.errore || "Prenotazione non riuscita");
  }
}

// ---------------------------------------------------------------
avvia();

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}
</script>

</body>
</html>
